name: CI — Tests & Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-tests:
    name: Pipeline — Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Run pylint
        run: pylint --fail-under=9.0 utilities/*.py pipeline.py

