name: CI — Tests & Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-tests:
    name: Pipeline — Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: pipeline
        run: python -m pytest tests/ -v

      - name: Run pylint
        working-directory: pipeline
        run: pylint --fail-under=9.0 utilities/*.py pipeline.py

  dashboard-tests:
    name: Dashboard — Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dashboard/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: dashboard
        run: pytest tests/ -v

      - name: Run pylint
        working-directory: dashboard
        run: pylint --fail-under=9.0 utils/*.py app.py
